<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小六壬卜卦</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>

<body>
    <div id="app">
        <!-- 首页 -->
        <div id="homePage" class="page active">
            <header class="app-header">
                <div class="logo-container">
                    <img src="logo.png" alt="小六壬" class="logo">
                    <h1>小六壬卜卦</h1>
                </div>
            </header>

            <main class="main-content">
                <div class="current-time">
                    <div class="date-display">
                        <span id="currentDate">loading...</span>
                        <span id="currentLunarDate">loading...</span>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">loading...</span>
                        <span id="currentHourBranch">loading...</span>
                    </div>
                    <button id="refreshTime" class="btn-secondary">
                        <i class="icon-refresh"></i>刷新时间
                    </button>
                </div>

                <div style="text-align: center; margin: 20px 0;">
                    <button class="btn-primary auto-button">立即起卦</button>
                </div>

                <p style="text-align: center;font-size: 12px;">点击"立即起卦"按钮后等待几秒钟</p>

                <div class="intro-text">
                    <h2 style="text-align: center;margin-top: 40px;">小六壬简介</h2>
                    <p>小六壬源于中国古代术数文化，是一种简便易学的占卜方法。它以农历时间为基础，通过特定的演算法则，推演吉凶祸福。小六壬占卜主要用于日常事务的趋吉避凶，具有操作简单、效验快速的特点。</p>
                    <div style="text-align: center;margin-top:60px;">作者：吴伟_Leo</div>
                </div>
            </main>
        </div>

        <!-- 起卦结果页面 -->
        <div id="resultPage" class="page">
            <header class="page-header">
                <button id="backToHomeFromResult" class="btn-back">
                    <i class="icon-back"></i>返回
                </button>
                <h2>卦象解读</h2>
            </header>

            <main class="main-content">
                <div class="divination-animation" id="divinationAnimation">
                    <div class="card-stack"></div>
                    <div class="selected-card"></div>
                </div>

                <div class="result-content">
                    <div class="hexagram-header">
                        <h2 id="hexagramName" class="hexagram-title"></h2>
                        <div class="divination-time">
                            <p id="divinationTime"></p>
                        </div>
                    </div>

                    <div class="interpretation-content">
                        <div class="interpretation-section">
                            <h3>总体评价</h3>
                            <p id="general"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>神煞含义</h3>
                            <p id="spirit_meaning"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>天气预测</h3>
                            <p id="weather"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>事业运势</h3>
                            <p id="career"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>爱情运势</h3>
                            <p id="love"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>财运状况</h3>
                            <p id="wealth"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>健康预警</h3>
                            <p id="health"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>失物寻找</h3>
                            <p id="lost_items"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>问运势</h3>
                            <p id="fortune"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>问神鬼</h3>
                            <p id="ghost"></p>
                        </div>
                        <div class="interpretation-section">
                            <h3>问行人</h3>
                            <p id="traveler"></p>
                        </div>
                        <div class="author-signature">
                            <p>@小六壬卜卦（作者：吴伟Leo）</p>
                        </div>
                    </div>

                    <div class="result-actions">
                        <button id="newDivination" class="btn-primary">重新起卦</button>
                        <button id="shareResult" class="btn-secondary">保存结果</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 农历转换库 -->
    <script src="lunar.js"></script>
    <script src="script.js"></script>
</body>

</html>
